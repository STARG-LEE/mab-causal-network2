<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mAb Stability — Causal Relationship Network</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-panel: #1a2035;
  --bg-hover: #243049;
  --border: #2a3550;
  --text-primary: #e8ecf4;
  --text-secondary: #8899b4;
  --text-muted: #556680;
  --accent: #60a5fa;
  --increases: #ef4444;
  --decreases: #3b82f6;
  --leads-to: #a855f7;
  --inhibits: #22c55e;
  --requires: #94a3b8;
  --associated: #475569;
  --node-cause: #fbbf24;
  --node-effect: #f87171;
  --node-balanced: #60a5fa;
  --radius: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}

/* === LAYOUT === */
.app {
  display: grid;
  grid-template-columns: 300px 1fr;
  grid-template-rows: auto minmax(0, 1fr);
  height: 100vh;
}

/* === HEADER === */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
}

.header h1 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.header h1 span {
  color: var(--accent);
  font-weight: 700;
}

.header-stats {
  display: flex;
  gap: 20px;
  font-size: 12px;
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace;
}

.header-stats .stat-val {
  color: var(--accent);
  font-weight: 500;
}

/* === SIDEBAR === */
.sidebar {
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.sidebar-inner {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.sidebar-inner::-webkit-scrollbar { width: 4px; }
.sidebar-inner::-webkit-scrollbar-track { background: transparent; }
.sidebar-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.panel-header {
  padding: 8px 12px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}

.panel-body { padding: 10px 12px; }

#relFilters {
  max-height: 35vh;
  overflow-y: auto;
}

#relFilters::-webkit-scrollbar { width: 4px; }
#relFilters::-webkit-scrollbar-track { background: transparent; }
#relFilters::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

#focusInfo {
  max-height: 35vh;
  overflow-y: auto;
}

#focusInfo::-webkit-scrollbar { width: 4px; }
#focusInfo::-webkit-scrollbar-track { background: transparent; }
#focusInfo::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* === RELATIONSHIP FILTERS === */
.rel-filter {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  cursor: pointer;
  transition: opacity 0.2s;
}

.rel-filter:hover { opacity: 0.8; }

.rel-filter input[type="checkbox"] {
  appearance: none;
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: all 0.15s;
}

.rel-filter input[type="checkbox"]:checked {
  border-color: var(--accent);
  background: var(--accent);
}

.rel-filter input[type="checkbox"]:checked::after {
  content: '✓';
  position: absolute;
  top: -1px;
  left: 2px;
  font-size: 11px;
  color: var(--bg-primary);
  font-weight: 700;
}

.rel-color {
  width: 24px;
  height: 3px;
  border-radius: 2px;
  flex-shrink: 0;
}

.rel-label {
  font-size: 12px;
  color: var(--text-primary);
  flex: 1;
}

.rel-count {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-muted);
}

/* === SLIDERS === */
.slider-group {
  padding: 8px 0;
}

.slider-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.slider-label {
  font-size: 12px;
  color: var(--text-secondary);
}

.slider-value {
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent);
  background: rgba(96, 165, 250, 0.1);
  padding: 2px 8px;
  border-radius: 4px;
}

input[type="range"] {
  width: 100%;
  height: 4px;
  appearance: none;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg-primary);
  box-shadow: 0 0 8px rgba(96, 165, 250, 0.4);
  cursor: pointer;
}

/* === NODE LEGEND === */
.node-legend {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.node-legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-secondary);
}

.node-legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,0.15);
}

/* === CSV UPLOAD === */
.upload-area {
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 12px;
  color: var(--text-muted);
}

.upload-area:hover {
  border-color: var(--accent);
  color: var(--text-secondary);
  background: rgba(96, 165, 250, 0.05);
}

.upload-area input { display: none; }

/* === GRAPH AREA === */
.graph-area {
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 50%, rgba(96,165,250,0.03) 0%, transparent 70%),
    var(--bg-primary);
}

.graph-area svg {
  width: 100%;
  height: 100%;
}

/* 카테고리 라벨 오버레이 — 항상 그래프 위에 고정 */
.category-labels-overlay {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 44px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 10;
  pointer-events: none;
  background: linear-gradient(to bottom, rgba(15,23,42,0.95) 0%, rgba(15,23,42,0.7) 60%, transparent 100%);
  padding: 0 40px;
}

.cat-label {
  font-size: 11px;
  font-weight: 700;
  font-family: 'IBM Plex Sans', sans-serif;
  padding: 4px 14px;
  border-radius: 12px;
  border: 1.5px solid;
  background: rgba(15,23,42,0.85);
  white-space: nowrap;
}

/* === TOOLTIP === */
.tooltip {
  position: fixed;
  pointer-events: none;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 12px;
  max-width: 360px;
  box-shadow: var(--shadow);
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.15s;
  line-height: 1.6;
}

.tooltip.visible { opacity: 1; }

.tooltip-title {
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 6px;
  color: var(--text-primary);
}

.tooltip-row {
  display: flex;
  gap: 8px;
  color: var(--text-secondary);
}

.tooltip-row .label {
  color: var(--text-muted);
  min-width: 55px;
}

.tooltip-rel {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
}

/* === EDGE STYLES === */
.link { fill: none; }
.link-associated { stroke-dasharray: 6, 4; }

/* === NODE STYLES === */
.node-circle {
  stroke: rgba(255,255,255,0.15);
  stroke-width: 1.5px;
  cursor: pointer;
  transition: stroke-width 0.15s;
}

.node-circle:hover {
  stroke: #fff;
  stroke-width: 2.5px;
}

.node-label {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 10px;
  fill: var(--text-secondary);
  pointer-events: none;
  text-anchor: middle;
  font-weight: 500;
}

/* === EMPTY STATE === */
.empty-state {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--text-muted);
}

.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 16px; color: var(--text-secondary); margin-bottom: 8px; }
.empty-state p { font-size: 13px; line-height: 1.6; }

/* === SEARCH === */
.search-result {
  padding: 4px 8px;
  cursor: pointer;
  border-radius: 3px;
  color: var(--text-secondary);
  transition: background 0.15s;
}
.search-result:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

/* === FOCUS MODE === */
.node-dimmed circle { opacity: 0.08 !important; }
.node-dimmed text { opacity: 0.08 !important; }
.link-dimmed { opacity: 0.03 !important; }
.node-highlighted circle { stroke: #fff !important; stroke-width: 3px !important; }
.node-focused circle { stroke: var(--accent) !important; stroke-width: 4px !important; filter: drop-shadow(0 0 8px var(--accent)); }

/* === FOCUS INFO === */
.focus-title { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
.focus-section { margin-top: 8px; }
.focus-section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 4px; }
.focus-edge { font-size: 11px; color: var(--text-secondary); padding: 2px 0; line-height: 1.5; }
.focus-edge-rel { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 1px 6px; border-radius: 3px; }
.focus-clear { margin-top: 10px; padding: 6px 12px; background: var(--border); border: none; border-radius: 4px; color: var(--text-primary); font-size: 11px; cursor: pointer; width: 100%; }
.focus-clear:hover { background: var(--bg-hover); }
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <h1><span>mAb Stability</span> — Causal Relationship Network</h1>
    <div class="header-stats">
      <span>Nodes <span class="stat-val" id="stat-nodes">0</span></span>
      <span>Edges <span class="stat-val" id="stat-edges">0</span></span>
      <span>Papers <span class="stat-val" id="stat-papers">0</span></span>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
  <div class="sidebar-inner">
    <!-- CSV Upload -->
    <div class="panel">
      <div class="panel-header">📂 데이터</div>
      <div class="panel-body">
        <div class="upload-area" id="uploadArea">
          <input type="file" id="csvInput" accept=".csv">
          <span id="uploadLabel">⏳ 레포 CSV 로딩 중...</span>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="panel">
      <div class="panel-header">🔍 노드 검색</div>
      <div class="panel-body">
        <input type="text" id="searchInput" placeholder="노드 이름 검색 (예: aggregation)" 
               style="width:100%; padding:8px 10px; background:var(--bg-primary); border:1px solid var(--border); border-radius:4px; color:var(--text-primary); font-size:12px; font-family:inherit; outline:none;">
        <div id="searchResults" style="max-height:150px; overflow-y:auto; margin-top:6px; font-size:11px;"></div>
      </div>
    </div>

    <!-- Focus Info -->
    <div class="panel" id="focusPanel" style="display:none;">
      <div class="panel-header">🎯 선택된 노드</div>
      <div class="panel-body" id="focusInfo"></div>
    </div>

    <!-- Relationship Type Filters -->
    <div class="panel">
      <div class="panel-header">⚡ 관계 유형</div>
      <div class="panel-body" id="relFilters"></div>
    </div>

    <!-- Frequency / Papers Sliders -->
    <div class="panel">
      <div class="panel-header">🎚 필터</div>
      <div class="panel-body">
        <div class="slider-group">
          <div class="slider-header">
            <span class="slider-label">최소 빈도</span>
            <span class="slider-value" id="freqValue">≥ 3</span>
          </div>
          <input type="range" id="freqSlider" min="1" max="20" value="3">
        </div>
        <div class="slider-group">
          <div class="slider-header">
            <span class="slider-label">최소 논문 수</span>
            <span class="slider-value" id="paperValue">≥ 3</span>
          </div>
          <input type="range" id="paperSlider" min="1" max="20" value="3">
        </div>
      </div>
    </div>

    <!-- Node Category Legend -->
    <div class="panel">
      <div class="panel-header">🏷 노드 카테고리 (좌→우 흐름)</div>
      <div class="panel-body">
        <div class="node-legend">
          <div class="node-legend-item">
            <div class="node-legend-dot" style="background:#c4b5fd"></div>
            <span>① 서열</span>
          </div>
          <div class="node-legend-item">
            <div class="node-legend-dot" style="background:#a78bfa"></div>
            <span>② 구조</span>
          </div>
          <div class="node-legend-item">
            <div class="node-legend-dot" style="background:#34d399"></div>
            <span>③ 제형</span>
          </div>
          <div class="node-legend-item">
            <div class="node-legend-dot" style="background:#fbbf24"></div>
            <span>④ 스트레스</span>
          </div>
          <div class="node-legend-item">
            <div class="node-legend-dot" style="background:#f87171"></div>
            <span>⑤ 안정성</span>
          </div>
          <div class="node-legend-item" style="margin-top:4px; padding-top:8px; border-top:1px solid var(--border);">
            <span style="color:var(--text-muted); font-size:11px;">노드 크기 = 언급 빈도 · 화살표 굵기 = 빈도</span>
          </div>
        </div>
      </div>
    </div>
  </div><!-- sidebar-inner -->
  </div><!-- sidebar -->

  <!-- GRAPH -->
  <div class="graph-area" id="graphArea">
    <div class="category-labels-overlay" id="categoryLabels"></div>
    <svg id="graphSvg"></svg>
  </div>
</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const REL_CONFIG = {
  // Group A: 범용 인과 (9개) — 빨강/파랑/보라 계열
  stabilizes:    { color: '#10b981', label: '안정화 (stabilizes)',      symbol: '⊕', group: 'A' },
  destabilizes:  { color: '#ef4444', label: '불안정화 (destabilizes)',   symbol: '⊖', group: 'A' },
  increases:     { color: '#f97316', label: '증가 (increases)',         symbol: '↑', group: 'A' },
  decreases:     { color: '#3b82f6', label: '감소 (decreases)',         symbol: '↓', group: 'A' },
  inhibits:      { color: '#06b6d4', label: '억제 (inhibits)',          symbol: '⊣', group: 'A' },

  induces:       { color: '#dc2626', label: '유발 (induces)',           symbol: '⇒', group: 'A' },
  prevents:      { color: '#0ea5e9', label: '차단 (prevents)',          symbol: '⊘', group: 'A' },
  requires:      { color: '#8b5cf6', label: '필요 (requires)',          symbol: '⊂', group: 'A' },
  // Group B: 구조/결합 (3개) — 청록 계열
  modifies:      { color: '#14b8a6', label: '구조변형 (modifies)',       symbol: '~>', group: 'B' },
  binds:         { color: '#2dd4bf', label: '결합 (binds)',             symbol: '⊷',  group: 'B' },
  shields:       { color: '#5eead4', label: '차폐 (shields)',           symbol: '▷',  group: 'B' },
  // Group C: 분해 메커니즘 (9개) — 주황/갈색/진한 계열
  aggregates:    { color: '#b91c1c', label: '응집 (aggregates)',        symbol: 'Ag', group: 'C' },
  oxidizes:      { color: '#c2410c', label: '산화 (oxidizes)',          symbol: 'Ox', group: 'C' },
  deamidates:    { color: '#a16207', label: '탈아미드화 (deamidates)',    symbol: 'Da', group: 'C' },
  isomerizes:    { color: '#92400e', label: '이성질화 (isomerizes)',      symbol: 'Is', group: 'C' },

  unfolds:       { color: '#7e22ce', label: '언폴딩 (unfolds)',          symbol: 'Un', group: 'C' },
  adsorbs:       { color: '#6d28d9', label: '흡착 (adsorbs)',           symbol: 'Ad', group: 'C' },
  precipitates:  { color: '#4338ca', label: '침전 (precipitates)',       symbol: 'Pp', group: 'C' },
  degrades:      { color: '#78350f', label: '분해 (degrades)',          symbol: 'Dg', group: 'C' },
  // Group D: 무방향 (1개)
  correlates:    { color: '#475569', label: '상관관계 (correlates)',      symbol: '~',  group: 'D' },
};

const REL_GROUPS = {
  A: { label: '범용 인과', count: 9 },
  B: { label: '구조/결합', count: 3 },
  C: { label: '분해 메커니즘', count: 9 },
  D: { label: '무방향', count: 1 },
};

// 노드 카테고리 설정: 안정성 예측 (Step 1)
// 서열 → 구조 → 제형 → 스트레스 → 안정성 검사 결과
const CATEGORY_CONFIG = {
  sequence:    { color: '#c4b5fd', label: '서열',       xRatio: 0.08 },
  structure:   { color: '#a78bfa', label: '구조',       xRatio: 0.27 },
  formulation: { color: '#34d399', label: '제형',       xRatio: 0.46 },
  stress:      { color: '#fbbf24', label: '스트레스',   xRatio: 0.65 },
  stability:   { color: '#f87171', label: '안정성',     xRatio: 0.87 },
};
const DEFAULT_CATEGORY = 'stability';

// ============================================================
// SAMPLE DATA (Step 2가 없어도 바로 데모 가능)
// ============================================================
const SAMPLE_DATA = [
  // ======= Step 1: 안정성 예측 (핵심 경로) =======
  // --- 서열 → 구조 (서열이 구조를 결정) ---
  {cause:"CDR Asn residue",category_cause:"sequence",effect:"deamidation-prone site",category_effect:"structure",relationship:"induces",frequency:8,num_papers:6,main_confidence:"high",sample_evidence:"Asn residues in CDR create deamidation-prone structural sites"},
  {cause:"glycosylation site",category_cause:"sequence",effect:"glycan shield",category_effect:"structure",relationship:"induces",frequency:10,num_papers:10,main_confidence:"high",sample_evidence:"N-linked glycosylation sites produce glycan shields on surface"},
  {cause:"Fc mutation",category_cause:"sequence",effect:"FcRn binding site",category_effect:"structure",relationship:"modifies",frequency:6,num_papers:5,main_confidence:"high",sample_evidence:"Fc mutations alter FcRn binding interface"},

  // --- 구조 → 안정성 (구조가 안정성에 영향) ---
  {cause:"hydrophobic patch",category_cause:"structure",effect:"aggregation",category_effect:"stability",relationship:"promotes",frequency:10,num_papers:8,main_confidence:"high",sample_evidence:"Surface hydrophobic patches promote self-association and aggregation"},
  {cause:"disulfide bond",category_cause:"structure",effect:"Tm",category_effect:"stability",relationship:"stabilizes",frequency:7,num_papers:7,main_confidence:"high",sample_evidence:"Disulfide bonds stabilize mAb thermal stability"},
  {cause:"glycan shield",category_cause:"structure",effect:"conformational stability",category_effect:"stability",relationship:"stabilizes",frequency:10,num_papers:10,main_confidence:"high",sample_evidence:"Glycan shield stabilizes mAb conformation"},
  {cause:"Fab domain",category_cause:"structure",effect:"Tm onset",category_effect:"stability",relationship:"correlates",frequency:6,num_papers:5,main_confidence:"medium",sample_evidence:"Fab thermal stability determines overall Tm onset"},

function zoomToFit(nodes, padding = 60) {
  if (!nodes || nodes.length === 0) return;
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
  const x0 = Math.min(...xs) - padding, x1 = Math.max(...xs) + padding;
  const y0 = Math.min(...ys) - padding, y1 = Math.max(...ys) + padding;
  const bw = x1 - x0, bh = y1 - y0;
  const scale = Math.min(width / bw, height / bh, 1);
  const tx = (width - bw * scale) / 2 - x0 * scale;
  const ty = (height - bh * scale) / 2 - y0 * scale;
  svg.transition().duration(500).call(
    zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

function buildRelFilters() {
  const container = document.getElementById('relFilters');
  const counts = {};
  rawData.forEach(d => { counts[d.relationship] = (counts[d.relationship] || 0) + 1; });

  container.innerHTML = '';
  let currentGroup = '';

  Object.entries(REL_CONFIG).forEach(([key, cfg]) => {
    // Group header
    if (cfg.group !== currentGroup) {
      currentGroup = cfg.group;
      const groupInfo = REL_GROUPS[currentGroup];
      const header = document.createElement('div');
      header.style.cssText = 'font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-muted); padding:8px 0 4px; margin-top:6px; border-top:1px solid var(--border); cursor:pointer; display:flex; justify-content:space-between; align-items:center;';
      if (currentGroup === 'A') header.style.borderTop = 'none';
      header.innerHTML = `<span>${currentGroup}. ${groupInfo.label}</span><span style="font-size:9px; color:var(--accent); font-family:JetBrains Mono,monospace;">전체</span>`;
      header.addEventListener('click', () => {
        const groupRels = Object.entries(REL_CONFIG).filter(([,v]) => v.group === currentGroup).map(([k]) => k);
        const allOn = groupRels.every(r => activeRels.has(r));
        groupRels.forEach(r => { if (allOn) activeRels.delete(r); else activeRels.add(r); });
        buildRelFilters();
        updateGraph();
      });
      container.appendChild(header);
    }

    const count = counts[key] || 0;
    const div = document.createElement('label');
    div.className = 'rel-filter';
    const isDashed = key === 'correlates';
    div.innerHTML = `
      <input type="checkbox" data-rel="${key}" ${activeRels.has(key) ? 'checked' : ''}>
      <div class="rel-color" style="background:${isDashed ? `repeating-linear-gradient(90deg,${cfg.color} 0,${cfg.color} 4px,transparent 4px,transparent 7px)` : cfg.color}"></div>
      <span class="rel-label">${cfg.label}</span>
      <span class="rel-count">${count}</span>
    `;
    div.querySelector('input').addEventListener('change', (e) => {
      if (e.target.checked) activeRels.add(key);
      else activeRels.delete(key);
      updateGraph();
    });
    container.appendChild(div);
  });
}

function parseCSV(text) {
  // BOM 제거
  text = text.replace(/^\ufeff/, '');
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  return lines.slice(1).map(line => {
    // Handle quoted fields with commas
    const values = [];
    let current = '';
    let inQuotes = false;
    for (const char of line) {
      if (char === '"') { inQuotes = !inQuotes; }
      else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
      else { current += char; }
    }
    values.push(current.trim());

    const obj = {};
    headers.forEach((h, i) => { obj[h] = values[i] || ''; });
    obj.frequency = parseInt(obj.frequency) || 1;
    obj.num_papers = parseInt(obj.num_papers) || 1;
    return obj;
  }).filter(d => d.cause && d.effect);
}

// ============================================================
// v3 → v4b 카테고리 자동 매핑 (기존 CSV 호환)
// ============================================================
const V3_DIRECT = {
  'formulation_factor': 'formulation',
  'stress_condition': 'stress',
  'degradation_pathway': 'stability',
};

// sequence_structure 분리용: 구조적 특성 키워드
const STRUCTURE_KEYWORDS = ['domain', 'fab', 'fc ', 'fc-', 'fcrn', 'ch2', 'ch3', 'hinge', 'patch', 'hydrophobic', 'charge patch', 'disulfide', 'conformation', 'folding', 'unfolding', 'tertiary', 'quaternary', 'secondary structure', 'beta-sheet', 'loop', 'framework'];
// sequence 키워드 (나머지는 기본 sequence)
const SEQUENCE_KEYWORDS = ['amino acid', 'residue', 'cdr', 'mutation', 'variant', 'glycosylation site', 'asn', 'asp', 'met', 'trp', 'lys', 'sequence', 'vh', 'vl', 'vhh', 'scfv', 'nanobod'];

function mapCategory(oldCat, nodeName) {
  // 이미 5개 카테고리이면 그대로
  if (CATEGORY_CONFIG[oldCat]) return oldCat;
  const lower = (nodeName || '').toLowerCase();
  // v3 직접 매핑
  if (V3_DIRECT[oldCat]) return V3_DIRECT[oldCat];
  // sequence_structure → sequence 또는 structure 분리
  if (oldCat === 'sequence_structure') {
    if (STRUCTURE_KEYWORDS.some(k => lower.includes(k))) return 'structure';
    return 'sequence';
  }
  // quality_attribute, clinical_outcome, 기타 → 모두 stability로
  // (개발가능성/PK/면역원성/임상은 현재 단계에서 안정성으로 통합)
  return 'stability';
}

// ============================================================
// GRAPH UPDATE
// ============================================================
function updateGraph() {
  // Filter data
  const filtered = rawData.filter(d =>
    activeRels.has(d.relationship) &&
    d.frequency >= minFreq &&
    d.num_papers >= minPapers
  );

  // Build nodes and links (with category tracking)
  const nodeMap = new Map();
  const nodeCats = {};  // node → category (most common)
  const nodeCatCounts = {};  // node → {cat: count}
  const links = [];

  filtered.forEach(d => {
    if (!nodeMap.has(d.cause)) nodeMap.set(d.cause, { id: d.cause, inW: 0, outW: 0, total: 0 });
    if (!nodeMap.has(d.effect)) nodeMap.set(d.effect, { id: d.effect, inW: 0, outW: 0, total: 0 });

    nodeMap.get(d.cause).outW += d.frequency;
    nodeMap.get(d.cause).total += d.frequency;
    nodeMap.get(d.effect).inW += d.frequency;
    nodeMap.get(d.effect).total += d.frequency;

    // Track categories (with v3→v4 mapping)
    if (d.category_cause) {
      const mapped = mapCategory(d.category_cause, d.cause);
      if (!nodeCatCounts[d.cause]) nodeCatCounts[d.cause] = {};
      nodeCatCounts[d.cause][mapped] = (nodeCatCounts[d.cause][mapped] || 0) + 1;
    }
    if (d.category_effect) {
      const mapped = mapCategory(d.category_effect, d.effect);
      if (!nodeCatCounts[d.effect]) nodeCatCounts[d.effect] = {};
      nodeCatCounts[d.effect][mapped] = (nodeCatCounts[d.effect][mapped] || 0) + 1;
    }

    links.push({
      source: d.cause,
      target: d.effect,
      relationship: d.relationship,
      frequency: d.frequency,
      num_papers: d.num_papers,
      confidence: d.main_confidence || 'medium',
      evidence: d.sample_evidence || '',
    });
  });

  // Determine primary category for each node
  const hasCategories = Object.keys(nodeCatCounts).length > 0;
  for (const [node, cats] of Object.entries(nodeCatCounts)) {
    const best = Object.entries(cats).sort((a,b) => b[1] - a[1])[0];
    if (best) nodeCats[node] = best[0];
  }
  // Assign default for uncategorized nodes
  nodeMap.forEach((v, k) => {
    if (!nodeCats[k]) nodeCats[k] = DEFAULT_CATEGORY;
    v.category = nodeCats[k];
  });

  const nodes = Array.from(nodeMap.values());

  // Update stats
  const allPapers = new Set();
  filtered.forEach(d => {
    if (d.pmid_list) d.pmid_list.split(';').forEach(p => allPapers.add(p));
    else allPapers.add(`${d.cause}-${d.effect}`);
  });
  document.getElementById('stat-nodes').textContent = nodes.length;
  document.getElementById('stat-edges').textContent = links.length;
  document.getElementById('stat-papers').textContent = allPapers.size;

  // Scales
  const maxFreq = Math.max(...links.map(l => l.frequency), 1);
  const maxTotal = Math.max(...nodes.map(n => n.total), 1);
  const rScale = d3.scaleSqrt().domain([1, maxTotal]).range([6, 30]);
  const wScale = d3.scaleLinear().domain([1, maxFreq]).range([1, 7]);
  nodes.forEach(n => { n.r = rScale(n.total); });

  function linkPath(d) {
    const sx = d.source.x, sy = d.source.y;
    const tx = d.target.x, ty = d.target.y;
    const dx = tx - sx, dy = ty - sy;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const sr = d.source.r || 6, tr = d.target.r || 6;
    // 소스 가장자리에서 출발, 타겟 가장자리에서 끝
    const x1 = sx + (dx / dist) * sr;
    const y1 = sy + (dy / dist) * sr;
    const x2 = tx - (dx / dist) * tr;
    const y2 = ty - (dy / dist) * tr;
    const dr = dist * 2;
    return `M${x1},${y1}A${dr},${dr} 0 0,1 ${x2},${y2}`;
  }

  // Clear
  zoomGroup.selectAll('*').remove();

  if (nodes.length === 0) {
    zoomGroup.append('text')
      .attr('x', width / 2).attr('y', height / 2)
      .attr('text-anchor', 'middle')
      .attr('fill', '#556680')
      .attr('font-size', 14)
      .text('필터 조건에 맞는 데이터가 없습니다. 조건을 완화해보세요.');
    return;
  }

  // ===== 계층형 레이아웃: 카테고리별 열, 열 안에서 균등 배치 =====
  const margin = { top: 60, bottom: 40, left: 40, right: 40 };
  const usableW = width - margin.left - margin.right;

  // 카테고리별 노드 그룹핑
  const catGroups = {};
  nodes.forEach(n => {
    const cat = n.category || DEFAULT_CATEGORY;
    if (!catGroups[cat]) catGroups[cat] = [];
    catGroups[cat].push(n);
  });

  // 각 그룹을 total(빈도) 내림차순 정렬
  Object.values(catGroups).forEach(arr => arr.sort((a, b) => b.total - a.total));

  // 가장 많은 열 기준으로 필요 높이 계산
  const maxCol = Math.max(...Object.values(catGroups).map(a => a.length), 1);
  const nodeSpacing = 60;
  const layoutH = Math.max(height, margin.top + 80 + maxCol * nodeSpacing);

  // viewBox는 화면 크기 유지 (zoom으로 맞춤)
  svg.attr('viewBox', [0, 0, width, height]);

  // 각 노드에 x, y 직접 배정
  Object.entries(catGroups).forEach(([cat, arr]) => {
    const cfg = CATEGORY_CONFIG[cat] || CATEGORY_CONFIG[DEFAULT_CATEGORY];
    const cx = margin.left + cfg.xRatio * usableW;
    const totalH = (arr.length - 1) * nodeSpacing;
    const startY = (layoutH - totalH) / 2;
    arr.forEach((n, i) => {
      n.x = cx;
      n.fx = cx;
      n.y = startY + i * nodeSpacing;
    });
  });

  // 링크의 source/target을 노드 객체로 연결
  const nodeById = new Map(nodes.map(n => [n.id, n]));
  links.forEach(l => {
    if (typeof l.source === 'string') l.source = nodeById.get(l.source);
    if (typeof l.target === 'string') l.target = nodeById.get(l.target);
  });
  // 양쪽 노드가 모두 존재하는 링크만 유지
  const validLinks = links.filter(l => l.source && l.target);

  // 카테고리 HTML 라벨 업데이트 (SVG 바깥 고정 오버레이)
  const drawnCats = new Set(nodes.map(n => n.category));
  const labelContainer = document.getElementById('categoryLabels');
  labelContainer.innerHTML = '';
  Object.entries(CATEGORY_CONFIG).forEach(([cat, cfg]) => {
    if (!drawnCats.has(cat)) return;
    const span = document.createElement('span');
    span.className = 'cat-label';
    span.style.color = cfg.color;
    span.style.borderColor = cfg.color + '66';
    span.textContent = cfg.label;
    labelContainer.appendChild(span);
  });

  // 카테고리 열 배경 밴드 (SVG 내부, 맨 아래 레이어)
  Object.entries(CATEGORY_CONFIG).forEach(([cat, cfg]) => {
    if (!drawnCats.has(cat)) return;
    const cx = margin.left + cfg.xRatio * usableW;
    zoomGroup.append('rect')
      .attr('x', cx - 55).attr('y', 0)
      .attr('width', 110).attr('height', layoutH)
      .attr('fill', cfg.color).attr('opacity', 0.03)
      .attr('rx', 8);
  });

  // Links
  const link = zoomGroup.append('g')
    .selectAll('path')
    .data(validLinks)
    .join('path')
    .attr('class', d => `link ${d.relationship === 'correlates' ? 'link-associated' : ''}`)
    .attr('stroke', d => REL_CONFIG[d.relationship]?.color || '#475569')
    .attr('stroke-width', d => wScale(d.frequency))
    .attr('stroke-opacity', 0.5)
    .attr('marker-end', d => `url(#arrow-${d.relationship})`)
    .attr('d', d => linkPath(d))
    .on('mouseover', (event, d) => showEdgeTooltip(event, d))
    .on('mousemove', (event) => moveTooltip(event))
    .on('mouseout', hideTooltip);

  // Nodes (카테고리별 색상)
  const node = zoomGroup.append('g')
    .selectAll('g')
    .data(nodes)
    .join('g')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .call(d3.drag()
      .on('drag', (event, d) => {
        d.x = event.x; d.y = event.y;
        d3.select(event.sourceEvent.target.parentNode)
          .attr('transform', `translate(${d.x},${d.y})`);
        link.attr('d', l => {
          const dx2 = l.target.x - l.source.x;
          const dy2 = l.target.y - l.source.y;
          const dr2 = Math.sqrt(dx2 * dx2 + dy2 * dy2) * 2;
          return `M${l.source.x},${l.source.y}A${dr2},${dr2} 0 0,1 ${l.target.x},${l.target.y}`;
        });
      }));

  node.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => rScale(d.total))
    .attr('fill', d => (CATEGORY_CONFIG[d.category] || CATEGORY_CONFIG[DEFAULT_CATEGORY]).color)
    .attr('fill-opacity', 0.85)
    .on('mouseover', (event, d) => showNodeTooltip(event, d))
    .on('mousemove', (event) => moveTooltip(event))
    .on('mouseout', hideTooltip)
    .on('click', (event, d) => {
      event.stopPropagation();
      focusedNode = (focusedNode === d.id) ? null : d.id;
      applyFocus();
    });

  node.append('text')
    .attr('class', 'node-label')
    .attr('dy', d => rScale(d.total) + 14)
    .text(d => d.id.length > 25 ? d.id.slice(0, 23) + '…' : d.id);

  // Store references for focus
  lastNodes = nodes;
  lastLinks = validLinks;
  lastNodeSel = node;
  lastLinkSel = link;

  // Apply focus if active
  if (focusedNode) applyFocus();

  // 전체 노드가 보이도록 자동 줌
  zoomToFit(nodes);
}

function showNodeTooltip(event, d) {
  const catCfg = CATEGORY_CONFIG[d.category] || {};
  tooltip.innerHTML = `
    <div class="tooltip-title">${d.id}</div>
    <div class="tooltip-row"><span class="label">카테고리</span> <span style="color:${catCfg.color || '#888'}">${catCfg.label || d.category}</span></div>
    <div class="tooltip-row"><span class="label">총 언급</span> ${d.total}회</div>
    <div class="tooltip-row"><span class="label">원인↗</span> ${d.outW}회</div>
    <div class="tooltip-row"><span class="label">결과↙</span> ${d.inW}회</div>
  `;
  tooltip.classList.add('visible');
}

function showEdgeTooltip(event, d) {
  const cfg = REL_CONFIG[d.relationship] || {};
  const srcCat = CATEGORY_CONFIG[d.source?.category] || {};
  const tgtCat = CATEGORY_CONFIG[d.target?.category] || {};
  tooltip.innerHTML = `
    <div class="tooltip-title"><span style="color:${srcCat.color || '#888'}">${d.source.id || d.source}</span> ${cfg.symbol || '→'} <span style="color:${tgtCat.color || '#888'}">${d.target.id || d.target}</span></div>
    <div class="tooltip-row"><span class="label">관계</span>
      <span class="tooltip-rel" style="background:${cfg.color}22; color:${cfg.color}">${cfg.label || d.relationship}</span>
    </div>
    <div class="tooltip-row"><span class="label">빈도</span> ${d.frequency}회</div>
    <div class="tooltip-row"><span class="label">논문</span> ${d.num_papers}편</div>
    <div class="tooltip-row"><span class="label">신뢰도</span> ${d.confidence}</div>
    ${d.evidence ? `<div class="tooltip-row" style="margin-top:4px; padding-top:4px; border-top:1px solid var(--border);"><span style="color:var(--text-muted); font-size:11px; font-style:italic;">"${d.evidence.slice(0, 120)}"</span></div>` : ''}
  `;
  tooltip.classList.add('visible');
}

function moveTooltip(event) {
  const x = Math.min(event.clientX + 16, window.innerWidth - 380);
  const y = Math.min(event.clientY + 16, window.innerHeight - 200);
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() { tooltip.classList.remove('visible'); }

// ============================================================
// FOCUS MODE — 노드 클릭 시 연결된 것만 하이라이트
// ============================================================
function applyFocus() {
  if (!lastNodeSel || !lastLinkSel) return;

  const panel = document.getElementById('focusPanel');
  const info = document.getElementById('focusInfo');

  if (!focusedNode) {
    // Unfocus: 모든 요소 복원
    lastNodeSel.attr('class', '');
    lastLinkSel.attr('class', d => `link ${d.relationship === 'correlates' ? 'link-associated' : ''}`);
    lastLinkSel.attr('stroke-opacity', 0.6);
    panel.style.display = 'none';
    return;
  }

  // Find connected nodes
  const connectedNodes = new Set([focusedNode]);
  const connectedEdges = [];
  lastLinks.forEach(l => {
    const srcId = l.source.id || l.source;
    const tgtId = l.target.id || l.target;
    if (srcId === focusedNode || tgtId === focusedNode) {
      connectedNodes.add(srcId);
      connectedNodes.add(tgtId);
      connectedEdges.push(l);
    }
  });

  // Dim non-connected
  lastNodeSel.attr('class', d => {
    if (d.id === focusedNode) return 'node-focused';
    if (connectedNodes.has(d.id)) return 'node-highlighted';
    return 'node-dimmed';
  });

  lastLinkSel.attr('class', d => {
    const srcId = d.source.id || d.source;
    const tgtId = d.target.id || d.target;
    if (srcId === focusedNode || tgtId === focusedNode) {
      return `link ${d.relationship === 'correlates' ? 'link-associated' : ''}`;
    }
    return 'link link-dimmed';
  });
  lastLinkSel.attr('stroke-opacity', d => {
    const srcId = d.source.id || d.source;
    const tgtId = d.target.id || d.target;
    return (srcId === focusedNode || tgtId === focusedNode) ? 0.8 : 0.03;
  });

  // Build info panel
  const outgoing = connectedEdges.filter(l => (l.source.id || l.source) === focusedNode);
  const incoming = connectedEdges.filter(l => (l.target.id || l.target) === focusedNode);

  let html = `<div class="focus-title">${focusedNode}</div>`;
  html += `<div style="font-size:11px; color:var(--text-muted);">연결 ${connectedEdges.length}개 (→${outgoing.length} / ←${incoming.length})</div>`;

  if (outgoing.length > 0) {
    html += `<div class="focus-section"><div class="focus-section-title">→ 영향을 주는 대상</div>`;
    outgoing.sort((a,b) => b.frequency - a.frequency);
    outgoing.forEach(e => {
      const cfg = REL_CONFIG[e.relationship] || {};
      html += `<div class="focus-edge"><span class="focus-edge-rel" style="background:${cfg.color}22; color:${cfg.color}">${e.relationship}</span> ${e.target.id || e.target} <span style="color:var(--text-muted)">(${e.frequency})</span></div>`;
    });
    html += `</div>`;
  }

  if (incoming.length > 0) {
    html += `<div class="focus-section"><div class="focus-section-title">← 영향을 받는 원인</div>`;
    incoming.sort((a,b) => b.frequency - a.frequency);
    incoming.forEach(e => {
      const cfg = REL_CONFIG[e.relationship] || {};
      html += `<div class="focus-edge">${e.source.id || e.source} <span class="focus-edge-rel" style="background:${cfg.color}22; color:${cfg.color}">${e.relationship}</span> <span style="color:var(--text-muted)">(${e.frequency})</span></div>`;
    });
    html += `</div>`;
  }

  html += `<button class="focus-clear" onclick="focusedNode=null; applyFocus();">✕ 포커스 해제</button>`;
  info.innerHTML = html;
  panel.style.display = 'block';
}

// Background click to unfocus
svg.on('click', () => {
  if (focusedNode) {
    focusedNode = null;
    applyFocus();
  }
});

// ============================================================
// SEARCH
// ============================================================
document.getElementById('searchInput').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase().trim();
  const container = document.getElementById('searchResults');

  if (query.length < 2) {
    container.innerHTML = '';
    return;
  }

  // Find matching nodes from current data
  const allNodes = new Set();
  rawData.forEach(d => {
    if (d.frequency >= minFreq && d.num_papers >= minPapers && activeRels.has(d.relationship)) {
      allNodes.add(d.cause);
      allNodes.add(d.effect);
    }
  });

  const matches = [...allNodes].filter(n => n.toLowerCase().includes(query)).sort().slice(0, 15);

  if (matches.length === 0) {
    container.innerHTML = '<div style="color:var(--text-muted); font-size:11px; padding:4px;">결과 없음</div>';
    return;
  }

  container.innerHTML = matches.map(n =>
    `<div class="search-result" onclick="focusedNode='${n.replace(/'/g, "\\'")}'; applyFocus(); document.getElementById('searchInput').value='${n.replace(/'/g, "\\'")}'; document.getElementById('searchResults').innerHTML='';">${n}</div>`
  ).join('');
});

// ============================================================
// INIT — 레포 CSV 자동 로드, 실패 시 샘플 데이터 사용
// ============================================================
const CSV_URL = 'https://raw.githubusercontent.com/STARG-LEE/mab-causal-network2/main/step2c_causal_edges_summary.csv';

async function init() {
  try {
    const response = await fetch(CSV_URL + '?t=' + Date.now());
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const text = await response.text();
    const parsed = parseCSV(text);

    if (parsed.length > 0) {
      rawData = parsed;
      const hasCats = parsed[0].category_cause ? '✅ 카테고리 포함' : '⚠ 카테고리 없음';
      document.getElementById('uploadLabel').innerHTML =
        `✅ ${CSV_URL.split('/').pop()}<br><small style="color:var(--text-muted)">로드 완료<br>${rawData.length}개 엣지 · ${hasCats}</small>`;
    } else {
      throw new Error('파싱 결과 없음');
    }
  } catch (e) {
    console.log('레포 CSV 로드 실패, 샘플 데이터 사용:', e.message);
    rawData = [...SAMPLE_DATA];
    document.getElementById('uploadLabel').innerHTML =
      `📊 샘플 데이터 사용 중<br><small style="color:var(--text-muted)">CSV 업로드로 교체 가능</small>`;
  }

  // 슬라이더 범위 업데이트
  const maxF = Math.max(...rawData.map(d => d.frequency), 20);
  const maxP = Math.max(...rawData.map(d => d.num_papers), 20);
  document.getElementById('freqSlider').max = maxF;
  document.getElementById('paperSlider').max = maxP;
  document.getElementById('freqSlider').value = minFreq;
  document.getElementById('paperSlider').value = minPapers;
  document.getElementById('freqValue').textContent = `≥ ${minFreq}`;
  document.getElementById('paperValue').textContent = `≥ ${minPapers}`;

  buildRelFilters();
  updateGraph();
}

init();
</script>
